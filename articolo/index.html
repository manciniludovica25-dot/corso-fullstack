<!-- Partendo dall’esercizio predente sui post, commenti e utenti, implementare una barra di ricerca che simuli una chiamata al back-end della durata tra i 1000 e i 4000 ms, i cui 
criteri di validazione sono che il campo è obbligatorio e deve essere di almeno 3 caratteri (controlli lato javascript e non HTML), che mostri all’utente solo i risultati 
trovati in base al titolo oppure al body del post. Genera un numero casuale da 1 a 10 dove in caso di 1 deve essere restituito un errore temporaneo del server con la possibilità
 di riprovare. Gestire il loader durante la fase di sleep che simula il caricamento del back-end, l’errore in caso di validazione oppure errore server, l’eventuale pulsante per
  riprovare e il caso di ritorno di un array di risultati vuoto. -->
  
<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articoli Con Ricerca</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Georgia, "Times New Roman", serif;
    background: #fdfcf9;
    color: #111;
    line-height: 1.6;
    padding: 30px;
}

.contenitore { max-width: 760px; margin: 0 auto; }

h1 {
    font-size: 42px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 25px;
    border-bottom: 2px solid #000;
    padding-bottom: 10px;
    letter-spacing: -0.5px;
}

.barra-ricerca, .barra-filtro {
    border-bottom: 1px solid #ccc;
    padding: 14px 0;
    margin-bottom: 16px;
}

.gruppo-ricerca { display: flex; flex-wrap: wrap; gap: 16px; }

.campo-ricerca { flex: 1; min-width: 220px; }

.campo-ricerca label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    display: block;
    margin-bottom: 4px;
}

.campo-ricerca input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #000;
    background: transparent;
    padding: 6px 2px;
    font-family: inherit;
    font-size: 15px;
}

.campo-ricerca input:focus { outline: none; border-bottom: 2px solid #000; }

.messaggio-validazione {
    font-size: 13px;
    color: #b00;
    margin-top: 4px;
    min-height: 18px;
}

button {
    background: none;
    border: 1px solid #000;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
}

button:hover { background: #000; color: #fff; }

.barra-filtro { display: flex; gap: 10px; align-items: center; }

.barra-filtro select {
    border: 1px solid #000;
    background: transparent;
    padding: 4px 8px;
    font-family: inherit;
}

.scheda-post { padding: 18px 0; border-bottom: 1px solid #ddd; }
.scheda-post h3 { font-size: 22px; margin-bottom: 6px; font-weight: bold; }
.scheda-post p { font-size: 15px; color: #333; }
.scheda-post button { margin-top: 8px; font-size: 13px; padding: 4px 10px; }

.pannello-paginazione {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border-top: 1px solid #ccc;
    border-bottom: 1px solid #ccc;
    padding: 10px 0;
    margin: 16px 0;
    min-height: 42px;
    flex-wrap: wrap;
}

.pannello-paginazione select { border: 1px solid #000; background: transparent; padding: 4px; }
.pannello-paginazione button:disabled { opacity: 0.4; }

.riepilogo-count {
    font-size: 13px;
    color: #555;
    font-style: italic;
    margin-left: 10px;
}

/* Nuovo stile per la barra dei risultati in basso */
.barra-risultati-basso {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid #ccc;
}
.controlli-pagina {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.badge-totale {
    background: #f0f0f0;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    color: #333;
}

.sfondo-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); padding: 20px; }
.sfondo-overlay.visibile { display: block; }

.finestra-overlay {
    background: #fff;
    max-width: 720px;
    margin: 40px auto;
    padding: 30px;
    border: 1px solid #000;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
}

.pulsante-chiudi { position: absolute; top: 10px; right: 14px; font-size: 20px; cursor: pointer; }
.finestra-overlay h2 { font-size: 26px; margin-bottom: 12px; }
.corpo-post { margin: 15px 0; font-size: 16px; }

.singolo-commento { border-top: 1px solid #ddd; padding: 10px 0; font-size: 14px; }
.singolo-commento strong { font-weight: bold; }
.singolo-commento small { color: #666; }

.messaggio-info { text-align: center; font-style: italic; padding: 30px; color: #666; }
.messaggio-errore { border: 1px solid #000; padding: 10px; background: #fafafa; margin-bottom: 10px; }
.messaggio-successo { border: 1px solid #000; padding: 10px; background: #f4f4f4; margin-bottom: 10px; }

.loader { text-align: center; padding: 40px; }
.spinner {
    width: 30px; height: 30px;
    border: 2px solid #000;
    border-top: 2px solid transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: auto;
}

mark { background-color: #fef9c3; padding: 0 2px; border-radius: 3px; }

@keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div class="contenitore">
        <h1>📝 Articoli</h1>

        <div class="barra-ricerca">
            <div class="gruppo-ricerca">
                <div class="campo-ricerca" style="flex:2">
                    <label>🔍 Cerca nei post</label>
                    <input type="text" id="campoRicerca" placeholder="Cerca per titolo o contenuto...">
                    <div id="validazioneRicerca" class="messaggio-validazione"></div>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <button id="pulsanteCerca">🔍 Cerca</button>
                    <button id="pulsanteReset">🗑️ Reset</button>
                </div>
            </div>
        </div>

        <div class="barra-filtro">
            <label>Filtra per utente:</label>
            <select id="selettoreUtente">
                <option value="">Tutti</option>
            </select>
            <button id="pulsanteFiltra">Applica filtro</button>
        </div>

        <div id="areaMessaggi"></div>

        <div id="contenitorePost"></div>

        <!-- Barra dei risultati spostata in basso -->
        <div id="barraRisultatiBasso" class="barra-risultati-basso">
    <div class="controlli-pagina" id="controlliPagina">
        <select id="selettoreLimite">
            <option value="5">5 per pagina</option>
            <option value="10" selected>10 per pagina</option>
            <option value="15">15 per pagina</option>
            <option value="20">20 per pagina</option>
            <option value="25">25 per pagina</option>
        </select>
        <button id="btnPrec">← Precedente</button>
        <span id="infoPagina">Pagina 1 di 1</span>
        <button id="btnSucc">Successiva →</button>
    </div>
</div>

    <div id="sfondoOverlay" class="sfondo-overlay">
        <div class="finestra-overlay">
            <span class="pulsante-chiudi" id="pulsanteChiudiOverlay">&times;</span>
            <div id="contenutoOverlay"></div>
        </div>
    </div>

    <script>
        const API = "https://jsonplaceholder.typicode.com";

        const stato = {
            mappaUtenti: new Map(),
            tuttiPost: [],
            articoliCorrente: [],
            paginaCorrente: 1,
            elementiPerPagina: 10,
            idUtenteFiltrato: null,
            ricercaAttiva: ""
        };

        const $ = id => document.getElementById(id);

        const delayCasuale = () =>
            new Promise(r => setTimeout(r, Math.random() * 3000 + 1000));

        const simulaErroreServer = () =>
            Math.floor(Math.random() * 10) + 1 === 1;

        // --- Validazione ---
        const validaRicerca = testo => {
            if (!testo || testo.trim() === "")
                return "⚠️ Il campo di ricerca è obbligatorio.";
            if (testo.trim().length < 3)
                return "⚠️ Inserisci almeno 3 caratteri.";
            return "";
        };

        // --- UI helpers ---
        const mostraLoader = () => {
            $("areaMessaggi").innerHTML = "";
            $("contenitorePost").innerHTML = `
                <div class="loader">
                    <div class="spinner"></div>
                    <p>⏳ Caricamento in corso...</p>
                </div>`;
            // Nascondi la barra dei risultati durante il caricamento
            $("barraRisultatiBasso").style.display = "none";
        };

        const mostraMessaggio = (html, tipo = "info") => {
            const classi = { info: "messaggio-info", errore: "messaggio-errore", successo: "messaggio-successo" };
            $("areaMessaggi").innerHTML = `<div class="${classi[tipo]}">${html}</div>`;
            if (tipo === "successo")
                setTimeout(() => $("areaMessaggi").innerHTML = "", 3000);
        };

        const mostraErroreConRetry = () => {
            $("contenitorePost").innerHTML = `
                <div class="messaggio-errore">
                    <strong>⚠️ Errore temporaneo del server</strong>
                    <p style="margin:10px 0">Il server ha riscontrato un problema. Riprova tra poco.</p>
                    <button id="pulsanteRetry">🔄 Riprova</button>
                </div>`;
            $("pulsanteRetry").onclick = () => eseguiRicerca($("campoRicerca").value);
            $("barraRisultatiBasso").style.display = "none";
        };

        // --- Caricamento post (con cache) ---
        const getPost = async () => {
            if (stato.tuttiPost.length === 0) {
                const r = await fetch(`${API}/posts`);
                if (!r.ok) throw new Error("ERRORE_RETE");
                stato.tuttiPost = await r.json();
            }
            return stato.tuttiPost;
        };

        // --- Visualizzazione con paginazione ---
        const evidenzia = (testo, termine) => {
            if (!termine || termine.length < 3) return testo;
            const re = new RegExp(`(${termine.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
            return testo.replace(re, "<mark>$1</mark>");
        };

        // Aggiorna la barra dei risultati in basso (SEMPRE visibile)
        const aggiornaBarraRisultati = (risultati, termine) => {
    const n = risultati.length;
    const totalePagine = Math.ceil(n / stato.elementiPerPagina);
    
    // Aggiorna le informazioni di pagina
    if (n > 0) {
        $("infoPagina").innerHTML = `Pagina ${stato.paginaCorrente} di ${totalePagine}`;
        $("btnPrec").disabled = (stato.paginaCorrente === 1);
        $("btnSucc").disabled = (stato.paginaCorrente === totalePagine);
    } else {
        $("infoPagina").innerHTML = `Nessun risultato`;
        $("btnPrec").disabled = true;
        $("btnSucc").disabled = true;
    }
    
    // Mostra sempre la barra dei risultati
    $("barraRisultatiBasso").style.display = "flex";
};

        const visualizzaRisultati = (risultati, termine) => {
            // Aggiorna la barra in basso
            aggiornaBarraRisultati(risultati, termine);
            
            if (!risultati.length) {
                $("contenitorePost").innerHTML = `
                    <div class="messaggio-info">
                        📭 Nessun risultato trovato${termine ? ` per "${termine}"` : ""}
                        <p style="margin-top:10px;font-size:13px">Prova con un'altra parola chiave</p>
                    </div>`;
                return;
            }
            
            const inizio = (stato.paginaCorrente - 1) * stato.elementiPerPagina;
            const pagina = risultati.slice(inizio, inizio + stato.elementiPerPagina);
            
            $("contenitorePost").innerHTML = pagina.map(post => {
                const autore = stato.mappaUtenti.get(post.userId);
                const nome = autore ? autore.name : `Utente #${post.userId}`;
                return `
                    <div class="scheda-post">
                        <h3>📌 ${evidenzia(post.title, termine)}</h3>
                        <p>👤 <strong>${nome}</strong></p>
                        <p>📄 ${evidenzia(post.body.substring(0, 100), termine)}${post.body.length > 100 ? "…" : ""}</p>
                        <button data-id="${post.id}">🔍 Dettagli</button>
                    </div>`;
            }).join("");
        };
        
        // Gestisce il cambio del numero di elementi per pagina
        const cambiaElementiPerPagina = (risultati, termine) => {
            const nuovoValore = parseInt($("selettoreLimite").value);
            if (stato.elementiPerPagina !== nuovoValore) {
                stato.elementiPerPagina = nuovoValore;
                stato.paginaCorrente = 1;
                visualizzaRisultati(risultati, termine);
            }
        };
        
        // Gestisce la pagina precedente
        const paginaPrecedente = (risultati, termine) => {
            if (stato.paginaCorrente > 1) {
                stato.paginaCorrente--;
                visualizzaRisultati(risultati, termine);
                // Scroll in cima ai risultati
                document.getElementById("contenitorePost").scrollIntoView({ behavior: "smooth", block: "start" });
            }
        };
        
        // Gestisce la pagina successiva
        const paginaSuccessiva = (risultati, termine) => {
            const totalePagine = Math.ceil(risultati.length / stato.elementiPerPagina);
            if (stato.paginaCorrente < totalePagine) {
                stato.paginaCorrente++;
                visualizzaRisultati(risultati, termine);
                // Scroll in cima ai risultati
                document.getElementById("contenitorePost").scrollIntoView({ behavior: "smooth", block: "start" });
            }
        };

        // --- Ricerca ---
        const eseguiRicerca = async testo => {
            const errore = validaRicerca(testo);
            if (errore) {
                $("validazioneRicerca").textContent = errore;
                $("campoRicerca").focus();
                return;
            }
            
            $("validazioneRicerca").textContent = "";
            mostraLoader();
            
            try {
                await delayCasuale();
                if (simulaErroreServer()) throw new Error("ERRORE_SERVER");
                
                const posts = await getPost();
                let risultati = stato.idUtenteFiltrato
                    ? posts.filter(p => p.userId === stato.idUtenteFiltrato)
                    : [...posts];
                
                const ricerca = testo.trim().toLowerCase();
                risultati = risultati.filter(p =>
                    p.title.toLowerCase().includes(ricerca) ||
                    p.body.toLowerCase().includes(ricerca)
                );
                
                stato.articoliCorrente = risultati;
                stato.ricercaAttiva = testo;
                stato.paginaCorrente = 1;
                
                if (risultati.length)
                    mostraMessaggio(`✅ Trovati ${risultati.length} articoli per "${testo}".`, "successo");
                
                visualizzaRisultati(risultati, testo.trim());
                
                // Ricollega gli eventi della barra dei risultati
                collegaEventiBarraRisultati(risultati, testo.trim());
                
            } catch (e) {
                if (e.message === "ERRORE_SERVER") {
                    mostraMessaggio("⚠️ Errore temporaneo del server.", "errore");
                    mostraErroreConRetry();
                } else {
                    mostraMessaggio("❌ Errore nel caricamento dei dati. Riprova più tardi.", "errore");
                    $("contenitorePost").innerHTML = "";
                    $("barraRisultatiBasso").style.display = "none";
                }
            }
        };
        
        // --- Carica post normalmente (senza ricerca) ---
        const caricaPost = async () => {
            mostraLoader();
            try {
                const posts = await getPost();
                const filtrati = stato.idUtenteFiltrato
                    ? posts.filter(p => p.userId === stato.idUtenteFiltrato)
                    : [...posts];
                stato.articoliCorrente = filtrati;
                stato.ricercaAttiva = "";
                stato.paginaCorrente = 1;
                visualizzaRisultati(filtrati, "");
                
                // Ricollega gli eventi della barra dei risultati
                collegaEventiBarraRisultati(filtrati, "");
            } catch {
                mostraMessaggio("❌ Errore nel caricamento dei post.", "errore");
                $("barraRisultatiBasso").style.display = "none";
            }
        };
        
        // Collega gli eventi della barra dei risultati
        const collegaEventiBarraRisultati = (risultati, termine) => {
            const selettoreLimite = $("selettoreLimite");
            const btnPrec = $("btnPrec");
            const btnSucc = $("btnSucc");
            
            // Rimuovi vecchi eventi e aggiungi nuovi
            const nuovoSelettore = selettoreLimite.cloneNode(true);
            selettoreLimite.parentNode.replaceChild(nuovoSelettore, selettoreLimite);
            nuovoSelettore.id = "selettoreLimite";
            nuovoSelettore.value = stato.elementiPerPagina.toString();
            nuovoSelettore.onchange = () => cambiaElementiPerPagina(risultati, termine);
            
            const nuovoBtnPrec = btnPrec.cloneNode(true);
            btnPrec.parentNode.replaceChild(nuovoBtnPrec, btnPrec);
            nuovoBtnPrec.id = "btnPrec";
            nuovoBtnPrec.onclick = () => paginaPrecedente(risultati, termine);
            
            const nuovoBtnSucc = btnSucc.cloneNode(true);
            btnSucc.parentNode.replaceChild(nuovoBtnSucc, btnSucc);
            nuovoBtnSucc.id = "btnSucc";
            nuovoBtnSucc.onclick = () => paginaSuccessiva(risultati, termine);
        };
        
        // --- Reset ---
        const resetRicerca = () => {
            $("campoRicerca").value = "";
            $("validazioneRicerca").textContent = "";
            $("areaMessaggi").innerHTML = "";
            caricaPost();
        };
        
        // --- Dettaglio post ---
        const mostraDettaglio = async idPost => {
            $("sfondoOverlay").classList.add("visibile");
            $("contenutoOverlay").innerHTML = '<p class="messaggio-info">⏳ Caricamento dettaglio...</p>';
            try {
                const [post, commenti] = await Promise.all([
                    fetch(`${API}/posts/${idPost}`).then(r => r.json()),
                    fetch(`${API}/comments?postId=${idPost}`).then(r => r.json())
                ]);
                const autore = stato.mappaUtenti.get(post.userId);
                const info = autore ? `${autore.name} (${autore.email})` : `Utente #${post.userId}`;
                $("contenutoOverlay").innerHTML = `
                    <h2>${post.title}</h2>
                    <p>👤 <strong>${info}</strong></p>
                    <div class="corpo-post">${post.body}</div>
                    <h3>💬 Commenti (${commenti.length})</h3>
                    ${commenti.map(c => `
                        <div class="singolo-commento">
                            <strong>${c.name}</strong>
                            <small>${c.email}</small>
                            <p>${c.body}</p>
                        </div>`).join("")}`;
            } catch {
                $("contenutoOverlay").innerHTML = '<p class="messaggio-errore">❌ Errore nel caricamento</p>';
            }
        };
        
        // --- Inizializzazione ---
        const inizializza = async () => {
            mostraLoader();
            try {
                const utenti = await fetch(`${API}/users`).then(r => r.json());
                utenti.forEach(u => stato.mappaUtenti.set(u.id, u));
                $("selettoreUtente").innerHTML =
                    '<option value="">Tutti</option>' +
                    utenti.map(u => `<option value="${u.id}">${u.name}</option>`).join("");
                await caricaPost();
            } catch {
                mostraMessaggio("❌ Errore nell'inizializzazione.", "errore");
                $("barraRisultatiBasso").style.display = "none";
            }
        };
        
        // --- Event listeners ---
        $("pulsanteCerca").onclick = () => eseguiRicerca($("campoRicerca").value);
        $("pulsanteReset").onclick = resetRicerca;
        
        $("campoRicerca").addEventListener("keypress", e => {
            if (e.key === "Enter") eseguiRicerca($("campoRicerca").value);
        });
        
        $("campoRicerca").addEventListener("input", () => {
            $("validazioneRicerca").textContent = "";
        });
        
        $("pulsanteFiltra").onclick = () => {
            const val = $("selettoreUtente").value;
            stato.idUtenteFiltrato = val ? parseInt(val) : null;
            stato.paginaCorrente = 1;
            if (stato.ricercaAttiva && stato.ricercaAttiva.length >= 3) {
                eseguiRicerca(stato.ricercaAttiva);
            } else {
                caricaPost();
            }
        };
        
        $("contenitorePost").addEventListener("click", e => {
            const btn = e.target.closest("button[data-id]");
            if (btn) mostraDettaglio(parseInt(btn.dataset.id));
        });
        
        const chiudiOverlay = () => $("sfondoOverlay").classList.remove("visibile");
        $("pulsanteChiudiOverlay").onclick = chiudiOverlay;
        $("sfondoOverlay").onclick = e => { if (e.target === $("sfondoOverlay")) chiudiOverlay(); };
        
        inizializza();
    </script>
</body>

</html>
